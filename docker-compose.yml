version: '3.8'

services:
  web:
    image: nginx:alpine
    restart: always
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro

  proxy:
    image: node:20-alpine
    restart: always
    volumes:
      - ./proxy.js:/app/proxy.js:ro
    working_dir: /app
    command: sh -c "npm install ws && node proxy.js"

  browser:
    image: browserless/chrome
    restart: always
    environment:
      - SCREEN_WIDTH=1280
      - SCREEN_HEIGHT=720
      - ENABLE_DEBUGGER=false
    depends_on:
      - web
    command: ["--url", "http://web"]
